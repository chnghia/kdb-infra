services:
  # PostgreSQL (Backoffice MetaDB)
  postgres:
    image: postgres:16-alpine
    container_name: kdb-postgres
    environment:
      POSTGRES_DB: kdb_backoffice
      POSTGRES_USER: kdb_user
      POSTGRES_PASSWORD: kdb_password_change_me
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kdb_user -d kdb_backoffice"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j (Graph Database)
  neo4j:
    image: neo4j:5-community
    container_name: kdb-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password_change_me}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # UI
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4j_password_change_me} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (Object Storage)
  minio:
    image: minio/minio:latest
    container_name: kdb-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Setup (Create bucket)
  minio-setup:
    image: minio/mc:latest
    container_name: kdb-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb local/kdb-documents || true;
      exit 0;
      "

  # Qdrant (Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kdb-qdrant
    ports:
      - "6333:6333" # HTTP API & Dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  minio_data:
  qdrant_data:
